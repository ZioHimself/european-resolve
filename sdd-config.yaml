# SDD Configuration
# Project-specific settings for the SDD framework
# Generated by /sdd init — 2026-05-09

commands:
  lint:
    full: "npm run lint"                          # inferred (Next.js default)
    single_file: "npx eslint {file}"              # inferred
  format:
    full: "npx prettier --write ."                # inferred
    single_file: "npx prettier --write {file}"    # inferred
  typecheck: "npx tsc --noEmit"                   # inferred
  test:
    full: "npm test"                              # inferred
    single_file: "npx vitest run {file}"          # inferred
    coverage: "npx vitest run --coverage"         # inferred
    coverage_report_path: "coverage/coverage-summary.json"  # inferred
  build: "npm run build"                          # inferred

bug_workflow:
  enabled: true
  branch_prefix: "bugfix"
  commit_prefix: "[BUGFIX]"
  analysis_review: true
  implementation_review: true
  max_analysis_retries: 2

bug_validation:
  bug_analysis:
    required_sections:
      - "Symptom"
      - "Root Cause"
      - "Fix Approach"
      - "Regression Test Plan"

validation:
  design:
    required_sections:
      - "Data Model"
      - "API"
      - "Edge Cases"
      - "Error"
      - "Acceptance Criteria"
  test:
    coverage_threshold: 80
    enforce_coverage: true
  implementation:
    max_file_lines: 500

protected_files:                                  # discovered + inferred
  - "package-lock.json"
  - ".env"
  - ".env.*"

lessons:
  max_entries: 50
  escalation_threshold: 3
  archive_policy: "rotate"

risk:
  default_classification: "HIC"
  turbo_override: false

orchestrator:
  max_retries_per_phase: 3
  max_code_review_loops: 2
  auto_commit: false                              # user-provided: no agent commits
  commit_prefix: "[SDD]"
  turbo_mode: false
  design_review: true
  max_validation_cycles: 5
  security_review: true                           # GDPR + security-sensitive org
  test_phases: ["unit", "integration"]
  auto_challenge_phases:
    best_practices: true
    project_goal: true
    pm_epics: true
    pm_tasks: false
    design: true
  challenger_perspectives:
    best_practices:
      - "technical"
    project_goal:
      - "business"
      - "technical"
    pm_epics:
      - "business"
      - "technical"
    design:
      - "technical"
      - "security"
  aikido:
    enabled: false
    api_secret_env: "AIKIDO_API_SECRET"
    repository_id: ""
    minimum_severity: "HIGH"
  risk_routing:
    high: "HITL"
    medium: "HIC"
    low: "HOTL"
  sast:
    enabled: false
    command: ""
    failure_threshold: "CRITICAL"
  mutation_testing:
    enabled: false
    command: ""
    threshold: 0

repository:
  enabled: false                                  # user-provided: trunk-based, no PRs
  provider: "github"                              # discovered (git remote)
  base_branch: "main"                             # discovered
  pr_title_prefix: ""
  default_reviewers: []
  github:
    owner: "ZioHimself"                           # discovered (git remote)
    repo: "european-resolve"                      # discovered (git remote)
  bitbucket:
    workspace: ""
    repo_slug: ""

task_tracking:
  enabled: false
  provider: ""
  jira:
    project_key: ""
    issue_prefix: ""
    epic_issue_type: ""
    task_issue_type: ""
    transitions:
      design_started: ""
      pr_created: ""
      pr_merged: ""
  github:
    owner: ""
    repo: ""
    epic_label: "epic"
    task_label: "task"
    issue_prefix: ""

certificates:
  enabled: true
  strictness: "warn"
  risk_routing:
    enabled: true
    hotl_mode: "abbreviated"
    hic_mode: "standard"
    hitl_mode: "full"
  verifier:
    enabled: false
    phases:
      - "security_design"
      - "security_impl"
      - "code_review"
      - "unit_test"
      - "integration_test"
      - "implement"
